services:
    app:
        build:
            context: ./
            dockerfile: Development.Dockerfile
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        ports:
            - "5173:5173"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
    queue-worker-default:
        build:
            context: ./
            dockerfile: Dockerfile
        deploy:
            mode: replicated
            replicas: 3
        entrypoint: php artisan queue:work
        restart: unless-stopped
    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "${NGINX_PORT_EXPOSE}:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx:/etc/nginx/conf.d/
    db:
        image: mariadb
        restart: unless-stopped
        environment:
            MARIADB_DATABASE: ${DB_DATABASE}
            MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
            MARIADB_PASSWORD: ${DB_PASSWORD}
            MARIADB_USER: ${DB_USERNAME}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            start_period: 10s
            retries: 3
    redis:
        image: redis:alpine
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            start_period: 10s
            retries: 3
