services:
    app:
        build:
            context: ./
            dockerfile: Deployment.Dockerfile
        restart: unless-stopped
        working_dir: /var/www/
        env_file:
            - .env
        volumes:
            - /var/www
    queue-worker-default:
        build:
            context: ./
            dockerfile: Dockerfile
        deploy:
            mode: replicated
            replicas: 3
        entrypoint: php artisan queue:work
        restart: unless-stopped
    nginx:
        image: nginx:alpine
        container_name: osudc-nginx
        restart: unless-stopped
        ports:
            - "${NGINX_PORT_EXPOSE}:80"
        volumes:
            - ./docker/nginx:/etc/nginx/conf.d/
        volumes_from:
            - app
